<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple 3D – © Marko Ullgren 1998-2026</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        background: #000;
        color: #eee;
        font-family: system-ui, sans-serif;
        display: flex;
        flex-direction: column;
        height: 100dvh;
        overflow: hidden;
      }
      nav {
        background: #1a1a1a;
        border-bottom: 1px solid #333;
        padding: 5px 10px;
        display: flex;
        gap: 14px;
        align-items: center;
        flex-shrink: 0;
        font-size: 13px;
      }
      nav label { display: flex; align-items: center; gap: 5px; }
      nav select {
        background: #2d2d2d;
        color: #eee;
        border: 1px solid #555;
        border-radius: 3px;
        padding: 2px 5px;
        font-size: 13px;
        cursor: pointer;
      }
      .hint {
        margin-left: auto;
        font-size: 11px;
        color: #666;
      }
      canvas { flex: 1; display: block; cursor: crosshair; }
    </style>
  </head>
  <body>
    <nav>
      <label>
        Body:
        <select id="body-select">
          <option value="mu">MU</option>
          <option value="cube">Cube</option>
          <option value="tetrahedron">Tetrahedron</option>
          <option value="octahedron">Octahedron</option>
          <option value="icosahedron">Icosahedron</option>
          <option value="torus">Torus</option>
          <option value="pyramid">Pyramid</option>
        </select>
      </label>
      <label>
        Colour:
        <select id="colour-select">
          <option value="blue">Blue</option>
          <option value="red">Red</option>
          <option value="green">Green</option>
        </select>
      </label>
      <span class="hint">Click to rotate · Scroll to zoom</span>
    </nav>
    <canvas id="canvas"></canvas>
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
